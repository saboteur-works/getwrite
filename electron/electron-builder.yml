appId: works.saboteur.getwrite
npmRebuild: false
productName: GetWrite
directories:
  output: ../dist-electron
  buildResources: assets
files:
  - dist/**
extraResources:
  - from: ../frontend/.next/standalone
    to: frontend/.next/standalone
    filter:
      - "**/*"
  - from: ../frontend/.next/static
    to: frontend/.next/standalone/frontend/.next/static
    filter:
      - "**/*"
  - from: ../getwrite-config
    to: getwrite-config
    filter:
      - "**/*"
  # Note: projects/ is intentionally NOT bundled — the packaged app creates an
  # empty projects dir under resourcesPath on first run (see main.ts), so installs
  # start with a clean workspace instead of shipping the repo's dev/test projects.
mac:
  category: public.app-category.productivity
  # Build a dmg per architecture so Intel (x64) Macs get a runnable binary —
  # an arm64-only build cannot launch on Intel (Rosetta only translates x64→arm64,
  # not the reverse). Produces GetWrite-<version>-x64.dmg and -arm64.dmg.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # Put the arch in every dmg name so users pick deliberately. Without this,
  # electron-builder leaves the x64 dmg arch-less (GetWrite-<v>.dmg), which an
  # Apple Silicon user can grab by mistake and end up running under Rosetta.
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target: nsis
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
